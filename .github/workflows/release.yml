name: Release

# Requires an NPM_TOKEN repo secret (npmjs.com -> Access Tokens -> Generate
# New Token -> Automation, added under Settings -> Secrets and variables ->
# Actions) before this can actually publish. Until that secret exists, the
# publish step below is skipped outright (a clean, green no-op notice)
# rather than attempting `changeset publish` and failing loudly with
# ENEEDAUTH on every single push to main.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check for NPM_TOKEN
        id: npm_token_check
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN secret not set — skipping npm publish. Add it under Settings > Secrets and variables > Actions to enable automated releases."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release Pull Request or publish to npm
        if: steps.npm_token_check.outputs.present == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
